version: eodhd-1.0.0
enabled: false
source_name: EODHD
source_type: market_data
connector_type: eodhd
base_url: https://eodhd.com/api
api_token_env: EODHD_API_TOKEN
api_token_file: config/eodhd.local.yaml
timeout_seconds: 20
max_retries: 3
use_environment_proxy: false
rate_limit_per_minute: 60
historical_eod:
  endpoint: /eod/{symbol}
  default_period: d
intraday:
  endpoint: /intraday/{symbol}
  default_interval: 5m
  max_range_days:
    1m: 120
    5m: 600
    1h: 7200
exchange_suffixes:
  US: US
  NASDAQ: US
  NYSE: US
  LSE: LSE
symbol_overrides:
  "000660": 000660.KO
  "002594": 002594.SHE
  "005490": 005490.KO
  "005935": 005935.KO
  SANN: SANN.SW
  VIX: VIX.INDX
news:
  enabled: true
  source_name: EODHD Financial News
  source_type: newswire
  connector_type: eodhd_news
  endpoint: /news
  use_global_feed: true
  per_symbol: false
  poll_interval_seconds: 900
  lookback_hours: 48
  limit: 50
  backfill_max_pages: 100
  max_symbols: 200
  rate_limit_per_minute: 60
  use_environment_proxy: false

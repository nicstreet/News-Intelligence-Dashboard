version: automation-1.0.0
enabled: false
poll_due_on_startup: false
scheduler_interval_seconds: 60
sources:
  sec_edgar:
    enabled: true
    stale_after_minutes: 180
    retry_attempts: 2
  world_news:
    enabled: true
    stale_after_minutes: 60
    retry_attempts: 2
  eodhd_news:
    enabled: true
    stale_after_minutes: 60
    retry_attempts: 2
  official_feed:
    enabled: true
    stale_after_minutes: 120
    retry_attempts: 2
market_data:
  enabled: true
  max_symbols_per_run: 12
  lookback_days: 120
retention:
  enabled: false
  apply_on_startup: false
  interval_minutes: 1440
  retention_days: {}

version: official-sources-1.0.0
description: Config-driven official RSS/Atom/HTTP feeds for macro, central-bank and regulated information sources.
sources:
  - source_id: federal_reserve_press
    source_name: Federal Reserve
    connector_type: official_feed_fed
    source_type: central_bank
    source_class: central_bank
    country_or_region: US
    authority_level: primary
    enabled: true
    url: https://www.federalreserve.gov/feeds/press_all.xml
    poll_interval_seconds: 1800
    limit: 25
    use_environment_proxy: false

  - source_id: ecb_press
    source_name: European Central Bank
    connector_type: official_feed_ecb
    source_type: central_bank
    source_class: central_bank
    country_or_region: Eurozone
    authority_level: primary
    enabled: false
    url: https://www.ecb.europa.eu/rss/press.html
    poll_interval_seconds: 1800
    limit: 25

  - source_id: bank_of_england
    source_name: Bank of England
    connector_type: official_feed_boe
    source_type: central_bank
    source_class: central_bank
    country_or_region: UK
    authority_level: primary
    enabled: false
    url: ""
    poll_interval_seconds: 1800
    limit: 25

